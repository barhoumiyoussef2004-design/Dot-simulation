    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, accretion, stars, eventHorizon, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 50);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 3, 0.5, 0.4);
            bloom.threshold = 0.0;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 20;
            controls.maxDistance = 100;
            
            createStars();
            createEventHorizon();
            createAccretionDisk();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createStars() {
            const geometry = new THREE.BufferGeometry();
            const count = 4000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const r = 50 + Math.random() * 100;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const b = 0.7 + Math.random() * 0.3;
                colors[i3] = b; colors[i3 + 1] = b; colors[i3 + 2] = b + Math.random() * 0.3;
                sizes[i] = Math.random() * 0.6 + 0.3;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * uPixelRatio * (100.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float a = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, a * 0.7);
                    }
                `,
                transparent: true,
                depthWrite: false,
                vertexColors: true
            });
            
            stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }
        
        function createEventHorizon() {
            const geometry = new THREE.SphereGeometry(4, 64, 64);
            const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
            eventHorizon = new THREE.Mesh(geometry, material);
            scene.add(eventHorizon);
        }
        
        function createAccretionDisk() {
            const geometry = new THREE.BufferGeometry();
            const count = 60000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const radii = new Float32Array(count);
            const angles = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                const r = 5 + Math.pow(Math.random(), 0.5) * 28;
                const theta = Math.random() * Math.PI * 2;
                const thickness = (1 - (r - 5) / 28) * 4;
                const y = (Math.random() - 0.5) * thickness;
                
                positions[i3] = Math.cos(theta) * r;
                positions[i3 + 1] = y;
                positions[i3 + 2] = Math.sin(theta) * r;
                
                const temp = 1 - (r - 5) / 28;
                if (temp > 0.75) {
                    colors[i3] = 1; colors[i3 + 1] = 1; colors[i3 + 2] = 1;
                } else if (temp > 0.5) {
                    colors[i3] = 1; colors[i3 + 1] = 0.9; colors[i3 + 2] = 0.6;
                } else if (temp > 0.25) {
                    colors[i3] = 1; colors[i3 + 1] = 0.5; colors[i3 + 2] = 0.15;
                } else {
                    colors[i3] = 0.7; colors[i3 + 1] = 0.2; colors[i3 + 2] = 0.5;
                }
                
                const brightness = 0.5 + temp * (0.5 + Math.random() * 0.5);
                colors[i3] *= brightness;
                colors[i3 + 1] *= brightness;
                colors[i3 + 2] *= brightness;
                
                sizes[i] = Math.random() * 0.8 + 0.4;
                randoms[i] = Math.random();
                radii[i] = r;
                angles[i] = theta;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aRadius', new THREE.BufferAttribute(radii, 1));
            geometry.setAttribute('aAngle', new THREE.BufferAttribute(angles, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    attribute float aRadius;
                    attribute float aAngle;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float rotSpeed = 0.12 / (aRadius * 0.03 + 0.3);
                        float newAngle = aAngle + uTime * rotSpeed;
                        
                        float spiral = sin(uTime * 0.4 + aRadius * 0.15) * 1.5;
                        float r = aRadius + spiral;
                        
                        pos.x = cos(newAngle) * r;
                        pos.z = sin(newAngle) * r;
                        
                        float wobble = sin(uTime * 2.5 + aAngle * 3.0) * 0.8 * aRandom;
                        pos.y += wobble;
                        
                        float temp = 1.0 - (aRadius - 5.0) / 28.0;
                        vAlpha = (0.4 + temp * 0.6) * (0.5 + aRandom * 0.5);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z) * (0.7 + temp * 0.5);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.1, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.6) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core * 0.6), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            accretion = new THREE.Points(geometry, material);
            scene.add(accretion);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            
            if (accretion) accretion.material.uniforms.uTime.value = time;
            
            controls.update();
            composer.render();
        }
    </script>
