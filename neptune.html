    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, planet, storms, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 45);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2, 0.5, 0.5);
            bloom.threshold = 0.0;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            createPlanet();
            createStorms();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createPlanet() {
            const geometry = new THREE.BufferGeometry();
            const count = 40000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 11;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const b = 0.55 + Math.random() * 0.45;
                const lat = Math.abs(positions[i3 + 1] / r);
                
                if (lat > 0.7) {
                    colors[i3] = b * 0.8; colors[i3 + 1] = b * 0.9; colors[i3 + 2] = b;
                } else {
                    colors[i3] = b * 0.3; colors[i3 + 1] = b * 0.5; colors[i3 + 2] = b;
                }
                
                sizes[i] = Math.random() * 0.4 + 0.2;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size; attribute float aRandom;
                    uniform float uTime; uniform float uPixelRatio;
                    varying vec3 vColor; varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        float t = uTime * 0.35;
                        float chaos = sin(t * 2.0 + aRandom * 8.0) * 0.5 + 0.5;
                        float angle = atan(pos.z, pos.x);
                        float newAngle = angle + t * 0.25 + aRandom;
                        float r = length(pos.xz);
                        pos.x = cos(newAngle) * r;
                        pos.z = sin(newAngle) * r;
                        vAlpha = (0.5 + chaos * 0.5) * 0.85;
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor; varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, glow * vAlpha);
                    }
                `,
                transparent: true, blending: THREE.NormalBlending, depthWrite: false, vertexColors: true
            });
            
            planet = new THREE.Points(geometry, material);
            scene.add(planet);
        }
        
        function createStorms() {
            const geometry = new THREE.BufferGeometry();
            const count = 6000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const distances = new Float32Array(count);
            const angles = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const stormAngle = Math.random() * Math.PI * 2;
                const stormR = 1 + Math.random() * 4;
                
                const r = Math.pow(Math.random(), 0.5) * 2.5;
                const theta = Math.random() * Math.PI * 2;
                
                positions[i3] = Math.cos(stormAngle) * stormR + Math.cos(theta) * r;
                positions[i3 + 1] = (Math.random() - 0.5) * 2;
                positions[i3 + 2] = Math.sin(stormAngle) * stormR + Math.sin(theta) * r;
                
                const b = 0.7 + Math.random() * 0.3;
                colors[i3] = b * 0.4; colors[i3 + 1] = b * 0.6; colors[i3 + 2] = b;
                
                sizes[i] = Math.random() * 0.5 + 0.2;
                randoms[i] = Math.random();
                distances[i] = stormR;
                angles[i] = stormAngle;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aDistance', new THREE.BufferAttribute(distances, 1));
            geometry.setAttribute('aAngle', new THREE.BufferAttribute(angles, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size; attribute float aRandom; attribute float aDistance; attribute float aAngle;
                    uniform float uTime; uniform float uPixelRatio;
                    varying vec3 vColor; varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        float t = uTime * 0.6;
                        float rotSpeed = 0.1 / (aDistance * 0.1 + 0.5);
                        float newAngle = aAngle + t * rotSpeed + aRandom;
                        float chaos = sin(t * 3.0 + aRandom * 10.0) * 0.5 + 0.5;
                        float r = aDistance + chaos * 0.5;
                        pos.x = cos(newAngle) * r;
                        pos.z = sin(newAngle) * r;
                        pos.y += sin(t * 4.0 + aRandom * 6.28) * aRandom * 0.8;
                        vAlpha = (0.5 + chaos * 0.5) * 0.8;
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor; varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.1, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.6) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core * 0.3), alpha);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
            });
            
            storms = new THREE.Points(geometry, material);
            scene.add(storms);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            if (planet) planet.material.uniforms.uTime.value = time;
            if (storms) storms.material.uniforms.uTime.value = time;
            controls.update();
            composer.render();
        }
    </script>
