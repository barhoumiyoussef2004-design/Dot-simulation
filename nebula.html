    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, dustParticles, stars, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.002);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 45);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.5, 0.5);
            bloom.threshold = 0.0;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxDistance = 100;
            controls.minDistance = 20;
            
            createBackgroundStars();
            createNebula();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createBackgroundStars() {
            const geometry = new THREE.BufferGeometry();
            const count = 5000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 300;
                positions[i3 + 1] = (Math.random() - 0.5) * 300;
                positions[i3 + 2] = (Math.random() - 0.5) * 300;
                
                const b = 0.3 + Math.random() * 0.7;
                colors[i3] = b; colors[i3 + 1] = b; colors[i3 + 2] = b + Math.random() * 0.2;
                sizes[i] = Math.random() * 0.5 + 0.2;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * uPixelRatio * (100.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float a = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, a * 0.6);
                    }
                `,
                transparent: true,
                depthWrite: false,
                vertexColors: true
            });
            
            stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }
        
        function createNebula() {
            const geometry = new THREE.BufferGeometry();
            const count = 60000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const types = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                const cloudType = Math.random();
                
                if (cloudType < 0.4) {
                    const r = Math.pow(Math.random(), 0.3) * 30;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = (Math.random() - 0.5) * Math.PI * 0.4;
                    positions[i3] = Math.cos(theta) * r * Math.cos(phi);
                    positions[i3 + 1] = Math.sin(phi) * r * 0.6;
                    positions[i3 + 2] = Math.sin(theta) * r * Math.cos(phi);
                    types[i] = 0;
                } else if (cloudType < 0.7) {
                    const t = Math.random() * Math.PI * 2;
                    const r1 = Math.pow(Math.random(), 0.5) * 25;
                    const r2 = Math.pow(Math.random(), 0.5) * 10;
                    positions[i3] = Math.cos(t) * (r1 + r2);
                    positions[i3 + 1] = (Math.random() - 0.5) * 15 + Math.sin(t * 2) * 3;
                    positions[i3 + 2] = Math.sin(t) * (r1 + r2) * 0.8;
                    types[i] = 1;
                } else {
                    const arm = Math.floor(Math.random() * 3);
                    const angle = arm * (Math.PI * 2 / 3) + (Math.random() - 0.5) * 1.5;
                    const r = Math.pow(Math.random(), 0.4) * 35;
                    positions[i3] = Math.cos(angle) * r;
                    positions[i3 + 1] = (Math.random() - 0.5) * 10;
                    positions[i3 + 2] = Math.sin(angle) * r;
                    types[i] = 2;
                }
                
                const colorType = Math.random();
                if (colorType < 0.35) {
                    colors[i3] = 0.9; colors[i3 + 1] = 0.2; colors[i3 + 2] = 0.5;
                } else if (colorType < 0.6) {
                    colors[i3] = 0.6; colors[i3 + 1] = 0.15; colors[i3 + 2] = 0.85;
                } else if (colorType < 0.8) {
                    colors[i3] = 1; colors[i3 + 1] = 0.4; colors[i3 + 2] = 0.3;
                } else {
                    colors[i3] = 0.3; colors[i3 + 1] = 0.6; colors[i3 + 2] = 1;
                }
                
                const brightness = 0.3 + Math.random() * 0.7;
                colors[i3] *= brightness;
                colors[i3 + 1] *= brightness;
                colors[i3 + 2] *= brightness;
                
                sizes[i] = Math.random() * 1.2 + 0.6;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aType', new THREE.BufferAttribute(types, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { 
                    uTime: { value: 0 }, 
                    uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } 
                },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    attribute float aType;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        float t = uTime * 0.15;
                        
                        float swirl = sin(length(pos.xz) * 0.08 + t + aRandom * 6.28) * 2.0;
                        float angle = atan(pos.z, pos.x);
                        float newAngle = angle + swirl * 0.02;
                        float r = length(pos.xz);
                        pos.x = cos(newAngle) * r;
                        pos.z = sin(newAngle) * r;
                        
                        float breathe = sin(t * 0.5 + aRandom * 3.14) * 0.3 + 1.0;
                        pos *= breathe;
                        
                        float wave = sin(pos.x * 0.1 + t * 2.0 + aRandom * 6.28) * aRandom * 2.0;
                        pos.y += wave;
                        
                        float depth = 1.0 - length(pos) / 40.0;
                        vAlpha = (0.4 + aRandom * 0.6) * (0.5 + depth * 0.5);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (180.0 / -mv.z) * (0.7 + aRandom * 0.6);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.12, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.5) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core * 0.6), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            dustParticles = new THREE.Points(geometry, material);
            scene.add(dustParticles);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            if (dustParticles) {
                dustParticles.material.uniforms.uTime.value = time;
            }
            
            controls.update();
            composer.render();
        }
    </script>
</body>
