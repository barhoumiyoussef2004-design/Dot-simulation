    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, debris, blast, ejecta, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 50);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 3.5, 0.5, 0.4);
            bloom.threshold = 0.0;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 20;
            controls.maxDistance = 100;
            
            createCore();
            createBlastWave();
            createDebris();
            createEjecta();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createCore() {
            const geometry = new THREE.BufferGeometry();
            const count = 500;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 2;
                positions[i3 + 1] = (Math.random() - 0.5) * 2;
                positions[i3 + 2] = (Math.random() - 0.5) * 2;
                
                colors[i3] = 1; colors[i3 + 1] = 0.95; colors[i3 + 2] = 0.8;
                sizes[i] = Math.random() * 2 + 1;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        float pulse = sin(uTime * 3.0) * 0.2 + 1.0;
                        vec4 mv = modelViewMatrix * vec4(pos * pulse, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.15, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core), core + glow * 0.8);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            scene.add(new THREE.Points(geometry, material));
        }
        
        function createBlastWave() {
            const geometry = new THREE.BufferGeometry();
            const count = 5000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const angles = new Float32Array(count);
            const radii = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 3;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const temp = 1;
                if (temp > 0.7) {
                    colors[i3] = 1; colors[i3 + 1] = 0.8; colors[i3 + 2] = 0.3;
                } else {
                    colors[i3] = 1; colors[i3 + 1] = 0.5; colors[i3 + 2] = 0.2;
                }
                
                sizes[i] = Math.random() * 0.5 + 0.3;
                randoms[i] = Math.random();
                angles[i] = theta;
                radii[i] = phi;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aAngle', new THREE.BufferAttribute(angles, 1));
            geometry.setAttribute('aRadius', new THREE.BufferAttribute(radii, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    attribute float aAngle;
                    attribute float aRadius;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float expand = uTime * 8.0 + aRandom * 5.0;
                        float r = 3.0 + expand;
                        
                        pos.x = r * sin(aRadius) * cos(aAngle);
                        pos.y = r * cos(aRadius);
                        pos.z = r * sin(aRadius) * sin(aAngle);
                        
                        float fade = max(0.0, 1.0 - expand / 30.0);
                        vAlpha = fade * (0.3 + aRandom * 0.4);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z) * fade;
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, glow * vAlpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            blast = new THREE.Points(geometry, material);
            scene.add(blast);
        }
        
        function createDebris() {
            const geometry = new THREE.BufferGeometry();
            const count = 40000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const speeds = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = Math.random() * 2;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const temp = Math.random();
                if (temp > 0.8) {
                    colors[i3] = 1; colors[i3 + 1] = 0.9; colors[i3 + 2] = 0.5;
                } else if (temp > 0.5) {
                    colors[i3] = 1; colors[i3 + 1] = 0.6; colors[i3 + 2] = 0.2;
                } else if (temp > 0.2) {
                    colors[i3] = 0.9; colors[i3 + 1] = 0.3; colors[i3 + 2] = 0.1;
                } else {
                    colors[i3] = 0.7; colors[i3 + 1] = 0.7; colors[i3 + 2] = 0.8;
                }
                
                const b = 0.3 + Math.random() * 0.7;
                colors[i3] *= b; colors[i3 + 1] *= b; colors[i3 + 2] *= b;
                
                sizes[i] = Math.random() * 0.6 + 0.2;
                randoms[i] = Math.random();
                speeds[i] = Math.random() * 0.8 + 0.4;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    attribute float aSpeed;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float t = uTime * aSpeed;
                        float dist = t * 3.0 + aRandom * 5.0;
                        
                        float theta = atan(pos.z, pos.x) + t * 0.3;
                        float phi = acos(pos.y / length(pos));
                        
                        pos.x = dist * sin(phi) * cos(theta) + sin(t * 2.0) * aRandom * 2.0;
                        pos.y = dist * cos(phi) + cos(t * 1.5) * aRandom * 2.0;
                        pos.z = dist * sin(phi) * sin(theta) + sin(t * 2.5) * aRandom * 2.0;
                        
                        float fade = max(0.0, 1.0 - t / 8.0);
                        vAlpha = fade * (0.4 + aRandom * 0.6);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z) * fade;
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.1, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.5) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core * 0.5), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            debris = new THREE.Points(geometry, material);
            scene.add(debris);
        }
        
        function createEjecta() {
            const geometry = new THREE.BufferGeometry();
            const count = 10000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 0.5;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                colors[i3] = 1; colors[i3 + 1] = 1; colors[i3 + 2] = 1;
                sizes[i] = Math.random() * 0.4 + 0.2;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying float vAlpha;
                    
                    void main() {
                        vec3 pos = position;
                        
                        float t = uTime * 2.0;
                        float spread = t * 5.0 * (0.5 + aRandom);
                        
                        float theta = atan(pos.z, pos.x) + aRandom * 6.28;
                        float phi = acos(pos.y / length(pos));
                        
                        pos.x = spread * sin(phi) * cos(theta);
                        pos.y = spread * cos(phi);
                        pos.z = spread * sin(phi) * sin(theta);
                        
                        float flicker = sin(uTime * 10.0 + aRandom * 20.0) * 0.5 + 0.5;
                        vAlpha = flicker * 0.6;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(1.0, 1.0, 1.0, glow * vAlpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            ejecta = new THREE.Points(geometry, material);
            scene.add(ejecta);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            if (blast) blast.material.uniforms.uTime.value = time;
            if (debris) debris.material.uniforms.uTime.value = time;
            if (ejecta) ejecta.material.uniforms.uTime.value = time;
            
            controls.update();
            composer.render();
        }
    </script>
