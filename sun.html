        .btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .title { position: fixed; top: 24px; right: 24px; font-size: 10px; letter-spacing: 3px; color: rgba(255,200,50,0.8); text-transform: uppercase; z-index: 100; }
    </style>
</head>

    <div class="title">The Sun</div>
    
    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, surface, corona, prominences, flares, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 45);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 3.5, 0.6, 0.3);
            bloom.threshold = 0.0;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 25;
            controls.maxDistance = 80;
            
            createSurface();
            createCorona();
            createProminences();
            createFlares();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createSurface() {
            const geometry = new THREE.BufferGeometry();
            const count = 15000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 12;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const granule = Math.random();
                if (granule > 0.7) {
                    colors[i3] = 1; colors[i3 + 1] = 0.95; colors[i3 + 2] = 0.7;
                } else if (granule > 0.4) {
                    colors[i3] = 1; colors[i3 + 1] = 0.85; colors[i3 + 2] = 0.5;
                } else {
                    colors[i3] = 1; colors[i3 + 1] = 0.75; colors[i3 + 2] = 0.4;
                }
                
                const b = 0.6 + Math.random() * 0.4;
                colors[i3] *= b; colors[i3 + 1] *= b; colors[i3 + 2] *= b;
                
                sizes[i] = Math.random() * 0.6 + 0.3;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float convection = sin(uTime * 2.0 + position.x * 0.5) * 0.3;
                        pos *= 1.0 + convection * aRandom * 0.05;
                        
                        float pulse = sin(uTime * 3.0 + aRandom * 6.28) * 0.1 + 1.0;
                        
                        vAlpha = 0.8 + aRandom * 0.2;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z) * pulse;
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.1, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.4) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core * 0.6), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            surface = new THREE.Points(geometry, material);
            scene.add(surface);
        }
        
        function createCorona() {
            const geometry = new THREE.BufferGeometry();
            const count = 40000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const angles = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 12.5 + Math.random() * 20;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const temp = 1 - (r - 12.5) / 20;
                colors[i3] = 1; 
                colors[i3 + 1] = 0.8 * temp + 0.2; 
                colors[i3 + 2] = 0.3 * temp;
                
                const b = temp * temp * 0.5;
                colors[i3] *= b; colors[i3 + 1] *= b; colors[i3 + 2] *= b;
                
                sizes[i] = Math.random() * 0.8 + 0.3;
                randoms[i] = Math.random();
                angles[i] = theta;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aAngle', new THREE.BufferAttribute(angles, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    attribute float aAngle;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float stream = sin(uTime * 0.5 + aAngle * 2.0) * 3.0 * aRandom;
                        float stream2 = cos(uTime * 0.7 + aAngle * 3.0) * 2.0 * aRandom;
                        
                        pos += normalize(pos) * (stream + stream2);
                        
                        float temp = 1.0 - length(pos) / 35.0;
                        vAlpha = temp * temp * (0.2 + aRandom * 0.3);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z) * (0.5 + temp * 0.5);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = glow * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0, 0.9, 0.7), glow * 0.3), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            corona = new THREE.Points(geometry, material);
            scene.add(corona);
        }
        
        function createProminences() {
            const geometry = new THREE.BufferGeometry();
            const count = 10000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const heights = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                const baseAngle = Math.random() * Math.PI * 2;
                const height = Math.random() * 8 + 3;
                const width = Math.random() * 2 + 0.5;
                
                const t = Math.random();
                const r = 12 + t * height;
                const theta = baseAngle + (Math.random() - 0.5) * width / r;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                colors[i3] = 1; colors[i3 + 1] = 0.4; colors[i3 + 2] = 0.2;
                const b = (1 - t) * 0.6;
                colors[i3] *= b; colors[i3 + 1] *= b; colors[i3 + 2] *= b;
                
                sizes[i] = Math.random() * 0.6 + 0.2;
                randoms[i] = Math.random();
                heights[i] = height;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aHeight', new THREE.BufferAttribute(heights, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    attribute float aHeight;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float surge = sin(uTime * 1.5 + aHeight * 0.5) * 1.0 * aRandom;
                        pos *= 1.0 + surge * 0.1;
                        
                        float flicker = sin(uTime * 5.0 + aRandom * 10.0) * 0.3 + 0.7;
                        vAlpha = flicker * (0.4 + aRandom * 0.4);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.08, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.5) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0, 0.8, 0.5), core * 0.5), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            prominences = new THREE.Points(geometry, material);
            scene.add(prominences);
        }
        
        function createFlares() {
            const geometry = new THREE.BufferGeometry();
            const count = 5000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 12 + Math.random() * 25;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                colors[i3] = 1; colors[i3 + 1] = 0.95; colors[i3 + 2] = 0.8;
                const b = 0.3 + Math.random() * 0.3;
                colors[i3] *= b; colors[i3 + 1] *= b; colors[i3 + 2] *= b;
                
                sizes[i] = Math.random() * 0.4 + 0.1;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying float vAlpha;
                    
                    void main() {
                        vec3 pos = position;
                        
                        float flare = sin(uTime * 8.0 + aRandom * 15.0) * 0.5 + 0.5;
                        flare *= sin(uTime * 3.0) * 0.5 + 0.5;
                        
                        vAlpha = flare * 0.6 * aRandom;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z) * (0.5 + flare * 0.5);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(1.0, 0.95, 0.8, glow * vAlpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            flares = new THREE.Points(geometry, material);
            scene.add(flares);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            if (surface) surface.material.uniforms.uTime.value = time;
            if (corona) corona.material.uniforms.uTime.value = time;
            if (prominences) prominences.material.uniforms.uTime.value = time;
            if (flares) flares.material.uniforms.uTime.value = time;
            
            controls.update();
            composer.render();
        }
    </script>
