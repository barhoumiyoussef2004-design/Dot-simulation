    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, curtains, rays, stars, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 40);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.5, 0.5);
            bloom.threshold = 0.0;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            createGround();
            createStars();
            createAurora();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createGround() {
            const geometry = new THREE.BufferGeometry();
            const count = 500;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 100;
                positions[i3 + 1] = -5 - Math.random() * 2;
                positions[i3 + 2] = (Math.random() - 0.5) * 50;
                
                colors[i3] = 0.05; colors[i3 + 1] = 0.08; colors[i3 + 2] = 0.05;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute vec3 color;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = 3.0 * uPixelRatio * (100.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        gl_FragColor = vec4(vColor, 1.0);
                    }
                `,
                vertexColors: true
            });
            
            scene.add(new THREE.Points(geometry, material));
        }
        
        function createStars() {
            const geometry = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 200;
                positions[i3 + 1] = Math.random() * 30 + 5;
                positions[i3 + 2] = (Math.random() - 0.5) * 100 - 20;
                
                const b = 0.5 + Math.random() * 0.5;
                colors[i3] = b; colors[i3 + 1] = b; colors[i3 + 2] = b + Math.random() * 0.2;
                sizes[i] = Math.random() * 0.3 + 0.1;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * uPixelRatio * (100.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float a = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, a * 0.7);
                    }
                `,
                transparent: true,
                depthWrite: false,
                vertexColors: true
            });
            
            stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }
        
        function createAurora() {
            const geometry = new THREE.BufferGeometry();
            const count = 50000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const heights = new Float32Array(count);
            const xPos = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                const baseX = (Math.random() - 0.5) * 60;
                const height = Math.random() * 25 + 5;
                const width = 2 + Math.random() * 4;
                
                positions[i3] = baseX + (Math.random() - 0.5) * width;
                positions[i3 + 1] = height;
                positions[i3 + 2] = (Math.random() - 0.5) * 30;
                
                xPos[i] = baseX;
                heights[i] = height;
                
                const altType = Math.random();
                if (height < 12) {
                    colors[i3] = 0.2; colors[i3 + 1] = 0.9; colors[i3 + 2] = 0.4;
                } else if (height < 18) {
                    colors[i3] = 0; colors[i3 + 1] = 1; colors[i3 + 2] = 0.6;
                } else if (height < 23) {
                    colors[i3] = 0.3; colors[i3 + 1] = 0.5; colors[i3 + 2] = 1;
                } else {
                    colors[i3] = 0.8; colors[i3 + 1] = 0.2; colors[i3 + 2] = 0.6;
                }
                
                sizes[i] = Math.random() * 0.8 + 0.4;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aHeight', new THREE.BufferAttribute(heights, 1));
            geometry.setAttribute('aXPos', new THREE.BufferAttribute(xPos, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { 
                    uTime: { value: 0 }, 
                    uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } 
                },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    attribute float aHeight;
                    attribute float aXPos;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float wave = sin(uTime * 0.8 + aXPos * 0.15) * 5.0 * aRandom;
                        float wave2 = sin(uTime * 1.2 + aXPos * 0.08) * 3.0 * aRandom;
                        
                        pos.x += wave + wave2;
                        pos.y += sin(uTime * 2.0 + aXPos * 0.2 + aRandom * 6.28) * aRandom * 3.0;
                        
                        float curtainWave = sin(aXPos * 0.3 + uTime * 1.5) * aRandom * 2.0;
                        pos.y += curtainWave * (1.0 - aHeight / 30.0);
                        
                        float shimmer = sin(uTime * 4.0 + aHeight * 0.5 + aRandom * 10.0) * 0.5 + 0.5;
                        float baseAlpha = sin(uTime * 0.3 + aXPos * 0.1) * 0.3 + 0.7;
                        
                        vAlpha = baseAlpha * (0.3 + shimmer * 0.5 + aRandom * 0.2);
                        vAlpha *= (1.0 - aHeight / 35.0);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z) * (0.7 + shimmer * 0.5);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.1, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.6) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0, 1.0, 0.8), core * 0.5), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            curtains = new THREE.Points(geometry, material);
            scene.add(curtains);
            
            createRays();
        }
        
        function createRays() {
            const geometry = new THREE.BufferGeometry();
            const count = 8000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                const rayX = (Math.random() - 0.5) * 50;
                const bottomY = Math.random() * 3;
                const topY = 15 + Math.random() * 20;
                const t = Math.random();
                
                positions[i3] = rayX + (Math.random() - 0.5) * 0.5;
                positions[i3 + 1] = bottomY + (topY - bottomY) * t;
                positions[i3 + 2] = (Math.random() - 0.5) * 15;
                
                if (positions[i3 + 1] < 15) {
                    colors[i3] = 0.2; colors[i3 + 1] = 1; colors[i3 + 2] = 0.5;
                } else {
                    colors[i3] = 0.5; colors[i3 + 1] = 0.3; colors[i3 + 2] = 1;
                }
                
                const b = 1 - (positions[i3 + 1] - bottomY) / (topY - bottomY);
                colors[i3] *= b; colors[i3 + 1] *= b; colors[i3 + 2] *= b;
                
                sizes[i] = Math.random() * 0.4 + 0.2;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { 
                    uTime: { value: 0 }, 
                    uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } 
                },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float flicker = sin(uTime * 3.0 + aRandom * 20.0) * 0.5 + 0.5;
                        pos.x += sin(uTime * 2.0 + aRandom * 6.28) * 2.0;
                        
                        vAlpha = flicker * (0.2 + aRandom * 0.4);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z) * (0.5 + flicker * 0.5);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, glow * vAlpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            rays = new THREE.Points(geometry, material);
            scene.add(rays);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            if (curtains) curtains.material.uniforms.uTime.value = time;
            if (rays) rays.material.uniforms.uTime.value = time;
            
            controls.update();
            composer.render();
        }
    </script>
