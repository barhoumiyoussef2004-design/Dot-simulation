    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, planet, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 35);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.4);
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            createJupiter();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createJupiter() {
            const geometry = new THREE.BufferGeometry();
            const count = 60000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const bandOffsets = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 12;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const lat = positions[i3 + 1] / r;
                const lon = Math.atan2(positions[i3 + 2], positions[i3]);
                
                let color;
                const absLat = Math.abs(lat);
                
                if (absLat > 0.85) {
                    color = { r: 1.0, g: 0.98, b: 0.95 };
                } else if (absLat > 0.75) {
                    color = { r: 0.75, g: 0.65, b: 0.55 };
                } else if (lat > 0.4 && lat < 0.55) {
                    color = { r: 0.85, g: 0.75, b: 0.65 };
                } else if (lat < -0.5 && lat > -0.65) {
                    color = { r: 0.6, g: 0.5, b: 0.45 };
                } else {
                    const bandPattern = Math.sin(lat * 18 + Math.cos(lon * 3) * 2);
                    if (bandPattern > 0.3) {
                        color = { r: 0.92, g: 0.85, b: 0.75 };
                    } else if (bandPattern > -0.1) {
                        color = { r: 0.75, g: 0.55, b: 0.4 };
                    } else {
                        color = { r: 0.65, g: 0.45, b: 0.35 };
                    }
                }
                
                const b = 0.7 + Math.random() * 0.3;
                colors[i3] = color.r * b;
                colors[i3 + 1] = color.g * b;
                colors[i3 + 2] = color.b * b;
                
                sizes[i] = Math.random() * 0.25 + 0.15;
                randoms[i] = Math.random();
                bandOffsets[i] = lat * 20;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aBandOffset', new THREE.BufferAttribute(bandOffsets, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size; attribute float aRandom; attribute float aBandOffset;
                    uniform float uTime; uniform float uPixelRatio;
                    varying vec3 vColor; varying vec2 vUv;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float rotSpeed = 0.08;
                        float t = uTime * rotSpeed;
                        float angle = atan(pos.z, pos.x);
                        float newAngle = angle + t;
                        float r = length(pos.xz);
                        pos.x = cos(newAngle) * r;
                        pos.z = sin(newAngle) * r;
                        
                        vUv = vec2(newAngle / 6.28 + 0.5, aBandOffset);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (180.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, glow * 0.95);
                    }
                `,
                transparent: true, depthWrite: false, vertexColors: true
            });
            
            planet = new THREE.Points(geometry, material);
            scene.add(planet);
            
            createGreatRedSpot();
            createBands();
        }
        
        function createGreatRedSpot() {
            const geometry = new THREE.BufferGeometry();
            const count = 5000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const spotData = new Float32Array(count * 3);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const r = Math.pow(Math.random(), 0.5) * 2.5;
                const theta = Math.random() * Math.PI * 2;
                
                const spotX = 3.0;
                const spotZ = 5.0;
                
                positions[i3] = spotX + Math.cos(theta) * r;
                positions[i3 + 1] = (Math.random() - 0.5) * 0.5;
                positions[i3 + 2] = spotZ + Math.sin(theta) * r * 0.5;
                
                const depth = 1.0 - r / 2.5;
                const b = 0.5 + Math.random() * 0.3;
                colors[i3] = b * 1.4;
                colors[i3 + 1] = b * 0.5;
                colors[i3 + 2] = b * 0.4;
                
                sizes[i] = Math.random() * 0.35 + 0.2;
                randoms[i] = Math.random();
                spotData[i3] = r;
                spotData[i3 + 1] = theta;
                spotData[i3 + 2] = depth;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aSpotData', new THREE.BufferAttribute(spotData, 3));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size; attribute float aRandom; attribute vec3 aSpotData;
                    uniform float uTime; uniform float uPixelRatio;
                    varying vec3 vColor;
                    
                    void main() {
                        float rotSpeed = 0.08;
                        float t = uTime * rotSpeed;
                        
                        float spotX = 3.0;
                        float spotZ = 5.0;
                        float r = aSpotData.x;
                        float theta = aSpotData.y + t * 0.6 + aRandom * 0.3;
                        
                        vec3 pos = position;
                        pos.x = spotX + cos(theta) * r;
                        pos.z = spotZ + sin(theta) * r * 0.5;
                        pos.y += sin(t * 4.0 + aRandom * 6.28) * 0.15;
                        
                        float depth = aSpotData.z;
                        vColor = color * (0.7 + depth * 0.3);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (180.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.15, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = core + glow * 0.6;
                        gl_FragColor = vec4(vColor, alpha * 0.9);
                    }
                `,
                transparent: true, depthWrite: false, vertexColors: true
            });
            
            const greatRedSpot = new THREE.Points(geometry, material);
            scene.add(greatRedSpot);
            
            window.greatRedSpot = greatRedSpot;
        }
        
        function createBands() {
            const geometry = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const r = 12.3;
                
                positions[i3] = r * Math.cos(theta);
                positions[i3 + 1] = (Math.random() - 0.5) * 0.8;
                positions[i3 + 2] = r * Math.sin(theta);
                
                const b = 0.8 + Math.random() * 0.2;
                colors[i3] = b; colors[i3 + 1] = b * 0.9; colors[i3 + 2] = b * 0.85;
                
                sizes[i] = Math.random() * 0.3 + 0.15;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    uniform float uTime; uniform float uPixelRatio;
                    varying vec3 vColor;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float rotSpeed = 0.08;
                        float t = uTime * rotSpeed;
                        float angle = atan(pos.z, pos.x);
                        float newAngle = angle + t;
                        float r = length(pos.xz);
                        pos.x = cos(newAngle) * r;
                        pos.z = sin(newAngle) * r;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (180.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, glow * 0.3);
                    }
                `,
                transparent: true, depthWrite: false, vertexColors: true
            });
            
            const bands = new THREE.Points(geometry, material);
            scene.add(bands);
            window.bands = bands;
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            if (planet) planet.material.uniforms.uTime.value = time;
            if (window.greatRedSpot) window.greatRedSpot.material.uniforms.uTime.value = time;
            if (window.bands) window.bands.material.uniforms.uTime.value = time;
            controls.update();
            composer.render();
        }
    </script>
