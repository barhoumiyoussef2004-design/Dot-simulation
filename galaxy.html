    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, galaxy, bulge, halo, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 50, 60);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2, 0.5, 0.6);
            bloom.threshold = 0.05;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxDistance = 150;
            controls.minDistance = 30;
            
            createGalaxy();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createGalaxy() {
            const arms = 4;
            const particlesPerArm = 25000;
            
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(arms * particlesPerArm * 3);
            const colors = new Float32Array(arms * particlesPerArm * 3);
            const sizes = new Float32Array(arms * particlesPerArm * 3);
            const randoms = new Float32Array(arms * particlesPerArm * 3);
            const radii = new Float32Array(arms * particlesPerArm * 3);
            const armAngles = new Float32Array(arms * particlesPerArm * 3);
            
            for (let arm = 0; arm < arms; arm++) {
                const baseAngle = arm * (Math.PI * 2 / arms);
                
                for (let i = 0; i < particlesPerArm; i++) {
                    const idx = arm * particlesPerArm + i;
                    const i3 = idx * 3;
                    
                    const t = i / particlesPerArm;
                    const radius = Math.pow(t, 0.5) * 50;
                    
                    const spreadAngle = (Math.random() - 0.5) * 1.2 * (1 - t * 0.5);
                    const spiralAngle = baseAngle + radius * 0.12 + spreadAngle;
                    
                    const armWidth = 3 + (1 - t) * 5;
                    const r = (Math.random() - 0.5) * armWidth;
                    
                    positions[i3] = Math.cos(spiralAngle) * (radius + r);
                    positions[i3 + 1] = (Math.random() - 0.5) * 2 * (1 - t * 0.7);
                    positions[i3 + 2] = Math.sin(spiralAngle) * (radius + r);
                    
                    const starType = Math.random();
                    if (t < 0.15) {
                        colors[i3] = 1; colors[i3 + 1] = 0.95; colors[i3 + 2] = 0.8;
                    } else if (starType < 0.3) {
                        colors[i3] = 1; colors[i3 + 1] = 0.7; colors[i3 + 2] = 0.3;
                    } else if (starType < 0.6) {
                        colors[i3] = 0.6; colors[i3 + 1] = 0.7; colors[i3 + 2] = 1;
                    } else {
                        colors[i3] = 1; colors[i3 + 1] = 1; colors[i3 + 2] = 1;
                    }
                    
                    const brightness = (1 - t * 0.6) * (0.5 + Math.random() * 0.5);
                    colors[i3] *= brightness;
                    colors[i3 + 1] *= brightness;
                    colors[i3 + 2] *= brightness;
                    
                    sizes[idx] = Math.random() * 0.8 + 0.3;
                    randoms[idx] = Math.random();
                    radii[idx] = radius;
                    armAngles[idx] = spiralAngle;
                }
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aRadius', new THREE.BufferAttribute(radii, 1));
            geometry.setAttribute('aArmAngle', new THREE.BufferAttribute(armAngles, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { 
                    uTime: { value: 0 }, 
                    uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } 
                },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    attribute float aRadius;
                    attribute float aArmAngle;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float rotSpeed = 0.015 / (aRadius * 0.02 + 0.3);
                        float newAngle = aArmAngle + uTime * rotSpeed;
                        float r = length(pos.xz);
                        pos.x = cos(newAngle) * r;
                        pos.z = sin(newAngle) * r;
                        
                        float pulse = sin(uTime * 2.0 + aRandom * 6.28) * 0.3 + 1.0;
                        pos.y += sin(uTime * 1.5 + aRadius * 0.1) * aRandom * 1.5;
                        
                        vAlpha = 0.5 + aRandom * 0.5;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z) * pulse;
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.1, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.5) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core * 0.7), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            galaxy = new THREE.Points(geometry, material);
            scene.add(galaxy);
            
            createBulge();
            createHalo();
        }
        
        function createBulge() {
            const geometry = new THREE.BufferGeometry();
            const count = 15000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const r = Math.pow(Math.random(), 2) * 12;
                const theta = Math.random() * Math.PI * 2;
                const phi = (Math.random() - 0.5) * Math.PI;
                
                positions[i3] = Math.cos(theta) * Math.cos(phi) * r;
                positions[i3 + 1] = Math.sin(phi) * r * 0.7;
                positions[i3 + 2] = Math.sin(theta) * Math.cos(phi) * r;
                
                const b = 0.8 + Math.random() * 0.2;
                colors[i3] = b; colors[i3 + 1] = b * 0.9; colors[i3 + 2] = b * 0.7;
                sizes[i] = Math.random() * 0.6 + 0.4;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float a = (1.0 - smoothstep(0.0, 0.5, d)) * 0.8;
                        gl_FragColor = vec4(vColor, a);
                    }
                `,
                transparent: true,
                depthWrite: false,
                vertexColors: true
            });
            
            bulge = new THREE.Points(geometry, material);
            scene.add(bulge);
        }
        
        function createHalo() {
            const geometry = new THREE.BufferGeometry();
            const count = 10000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const r = 15 + Math.pow(Math.random(), 0.3) * 45;
                const theta = Math.random() * Math.PI * 2;
                const phi = (Math.random() - 0.5) * Math.PI * 0.8;
                
                positions[i3] = Math.cos(theta) * Math.cos(phi) * r;
                positions[i3 + 1] = Math.sin(phi) * r * 0.3;
                positions[i3 + 2] = Math.sin(theta) * Math.cos(phi) * r;
                
                const b = (1 - (r - 15) / 45) * 0.4;
                colors[i3] = b; colors[i3 + 1] = b * 0.9; colors[i3 + 2] = b * 0.8;
                sizes[i] = Math.random() * 0.4 + 0.2;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * uPixelRatio * (150.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float a = (1.0 - smoothstep(0.0, 0.5, d)) * 0.3;
                        gl_FragColor = vec4(vColor, a);
                    }
                `,
                transparent: true,
                depthWrite: false,
                vertexColors: true
            });
            
            halo = new THREE.Points(geometry, material);
            scene.add(halo);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            if (galaxy) {
                galaxy.material.uniforms.uTime.value = time;
            }
            
            controls.update();
            composer.render();
        }
    </script>
