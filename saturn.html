    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 45);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.4);
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            createSaturn();
            createRings();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createSaturn() {
            const geometry = new THREE.BufferGeometry();
            const count = 50000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 10;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const lat = positions[i3 + 1] / r;
                const absLat = Math.abs(lat);
                let color;
                
                if (absLat > 0.75) {
                    color = { r: 0.95, g: 0.92, b: 0.88 };
                } else {
                    const bandPattern = Math.sin(lat * 25);
                    if (bandPattern > 0.2) {
                        color = { r: 0.88, g: 0.82, b: 0.72 };
                    } else if (bandPattern > -0.2) {
                        color = { r: 0.82, g: 0.72, b: 0.6 };
                    } else {
                        color = { r: 0.75, g: 0.65, b: 0.55 };
                    }
                }
                
                const b = 0.7 + Math.random() * 0.3;
                colors[i3] = color.r * b;
                colors[i3 + 1] = color.g * b;
                colors[i3 + 2] = color.b * b;
                
                sizes[i] = Math.random() * 0.25 + 0.12;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size; attribute float aRandom;
                    uniform float uTime; uniform float uPixelRatio;
                    varying vec3 vColor;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float rotSpeed = 0.09;
                        float t = uTime * rotSpeed;
                        float angle = atan(pos.z, pos.x);
                        float newAngle = angle + t;
                        float r = length(pos.xz);
                        pos.x = cos(newAngle) * r;
                        pos.z = sin(newAngle) * r;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (180.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, glow * 0.95);
                    }
                `,
                transparent: true, depthWrite: false, vertexColors: true
            });
            
            const planet = new THREE.Points(geometry, material);
            scene.add(planet);
            window.planet = planet;
        }
        
        function createRings() {
            const geometry = new THREE.BufferGeometry();
            const count = 80000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const radii = new Float32Array(count);
            
            const ringColors = [
                { r: 0.85, g: 0.8, b: 0.72 },
                { r: 0.75, g: 0.7, b: 0.62 },
                { r: 0.65, g: 0.6, b: 0.55 },
                { r: 0.9, g: 0.85, b: 0.78 },
                { r: 0.7, g: 0.65, b: 0.58 }
            ];
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                const ringR = 14 + Math.random() * 14;
                const theta = Math.random() * Math.PI * 2;
                const thickness = 0.4 + Math.random() * 0.3;
                
                positions[i3] = Math.cos(theta) * ringR + (Math.random() - 0.5) * thickness;
                positions[i3 + 1] = (Math.random() - 0.5) * 1.5;
                positions[i3 + 2] = Math.sin(theta) * ringR + (Math.random() - 0.5) * thickness;
                
                const ringPos = (ringR - 14) / 14;
                const colorIdx = Math.floor(ringPos * ringColors.length) % ringColors.length;
                const baseColor = ringColors[colorIdx];
                
                let b = 0.6 + (1.0 - ringPos) * 0.35 + Math.random() * 0.15;
                
                const gap1 = ringR > 21 && ringR < 22.5;
                const gap2 = ringR > 24 && ringR < 25;
                if (gap1 || gap2) b = 0.15;
                
                colors[i3] = baseColor.r * b;
                colors[i3 + 1] = baseColor.g * b;
                colors[i3 + 2] = baseColor.b * b;
                
                sizes[i] = Math.random() * 0.3 + 0.1;
                randoms[i] = Math.random();
                radii[i] = ringR;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aRadius', new THREE.BufferAttribute(radii, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size; attribute float aRandom; attribute float aRadius;
                    uniform float uTime; uniform float uPixelRatio;
                    varying vec3 vColor;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float rotSpeed = 0.09;
                        float t = uTime * rotSpeed;
                        float angle = atan(pos.z, pos.x) + t;
                        float r = length(pos.xz);
                        pos.x = cos(angle) * r;
                        pos.z = sin(angle) * r;
                        
                        float chaos = sin(t * 3.0 + aRandom * 6.28) * 0.5 + 0.5;
                        float brightness = 0.6 + chaos * 0.4;
                        vColor *= brightness;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (180.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.1, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = core * 0.9 + glow * 0.5;
                        gl_FragColor = vec4(vColor, alpha * 0.85);
                    }
                `,
                transparent: true, depthWrite: false, vertexColors: true
            });
            
            const rings = new THREE.Points(geometry, material);
            scene.add(rings);
            window.rings = rings;
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            if (window.planet) window.planet.material.uniforms.uTime.value = time;
            if (window.rings) window.rings.material.uniforms.uTime.value = time;
            controls.update();
            composer.render();
        }
    </script>
</body>
