    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, land, clouds, atmosphere, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 40);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2, 0.5, 0.5);
            bloom.threshold = 0.0;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            createLand();
            createAtmosphere();
            createClouds();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createLand() {
            const geometry = new THREE.BufferGeometry();
            const count = 40000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 10;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const lat = Math.abs(positions[i3 + 1] / r);
                const lon = Math.atan2(positions[i3 + 2], positions[i3]);
                
                if (lat > 0.65 || (lat < 0.15 && Math.random() > 0.3)) {
                    colors[i3] = 0.9; colors[i3 + 1] = 0.95; colors[i3 + 2] = 1;
                } else if (Math.sin(lon * 3 + lat * 5) > 0.2 && lat < 0.6) {
                    colors[i3] = 0.2; colors[i3 + 1] = 0.6; colors[i3 + 2] = 0.3;
                } else {
                    colors[i3] = 0.1; colors[i3 + 1] = 0.3; colors[i3 + 2] = 0.7;
                }
                
                const b = 0.7 + Math.random() * 0.3;
                colors[i3] *= b; colors[i3 + 1] *= b; colors[i3 + 2] *= b;
                
                sizes[i] = Math.random() * 0.35 + 0.15;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size; attribute float aRandom;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, glow * 0.9);
                    }
                `,
                transparent: true, depthWrite: false, vertexColors: true
            });
            
            land = new THREE.Points(geometry, material);
            scene.add(land);
        }
        
        function createAtmosphere() {
            const geometry = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 10.2;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                colors[i3] = 0.5; colors[i3 + 1] = 0.7; colors[i3 + 2] = 1;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute vec3 color;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = 3.0 * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float a = (1.0 - smoothstep(0.0, 0.5, d)) * 0.4;
                        gl_FragColor = vec4(vColor, a);
                    }
                `,
                transparent: true, depthWrite: false, vertexColors: true
            });
            
            atmosphere = new THREE.Points(geometry, material);
            scene.add(atmosphere);
        }
        
        function createClouds() {
            const geometry = new THREE.BufferGeometry();
            const count = 35000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 10.4 + Math.random() * 0.5;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const b = 0.9 + Math.random() * 0.1;
                colors[i3] = b; colors[i3 + 1] = b; colors[i3 + 2] = b;
                
                sizes[i] = Math.random() * 0.5 + 0.2;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size; attribute float aRandom;
                    uniform float uTime; uniform float uPixelRatio;
                    varying float vAlpha;
                    
                    void main() {
                        vec3 pos = position;
                        float t = uTime * 0.35;
                        float angle = atan(pos.z, pos.x);
                        float newAngle = angle + t * 0.3 + aRandom * 1.5;
                        float r = length(pos.xz);
                        pos.x = cos(newAngle) * r;
                        pos.z = sin(newAngle) * r;
                        float chaos = sin(t * 2 + aRandom * 8) * 0.5 + 0.5;
                        vAlpha = (0.4 + chaos * 0.6) * 0.65;
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(1.0, 1.0, 1.0, glow * vAlpha);
                    }
                `,
                transparent: true, blending: THREE.NormalBlending, depthWrite: false, vertexColors: true
            });
            
            clouds = new THREE.Points(geometry, material);
            scene.add(clouds);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;
            if (clouds) clouds.material.uniforms.uTime.value = time;
            controls.update();
            composer.render();
        }
    </script>
</body>
