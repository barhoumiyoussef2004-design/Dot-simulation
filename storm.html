    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, particles, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 40;
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.3, 0.6);
            bloom.threshold = 0.0;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            createParticles();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createParticles() {
            if (particles) { scene.remove(particles); particles.geometry.dispose(); particles.material.dispose(); }
            
            const geometry = new THREE.BufferGeometry();
            const count = 80000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const angles = new Float32Array(count);
            const speeds = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = Math.pow(Math.random(), 0.3) * 35;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi) * 0.5;
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const brightness = Math.random();
                if (brightness < 0.3) {
                    colors[i3] = 1; colors[i3 + 1] = 0.9; colors[i3 + 2] = 0.7;
                } else if (brightness < 0.6) {
                    colors[i3] = 0.6; colors[i3 + 1] = 0.6; colors[i3 + 2] = 1;
                } else {
                    colors[i3] = 1; colors[i3 + 1] = 0.5; colors[i3 + 2] = 0.2;
                }
                
                sizes[i] = Math.random() * 0.3 + 0.1;
                randoms[i] = Math.random();
                angles[i] = Math.random() * Math.PI * 2;
                speeds[i] = Math.random() * 0.5 + 0.5;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aAngle', new THREE.BufferAttribute(angles, 1));
            geometry.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size; attribute float aRandom; attribute float aAngle; attribute float aSpeed;
                    uniform float uTime; uniform float uPixelRatio;
                    varying vec3 vColor; varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        float t = uTime * 0.5 * aSpeed;
                        float chaos = sin(t * 3.0 + aRandom * 10.0) * 0.5 + 0.5;
                        float angle = t * 2.0 + aAngle;
                        float radius = length(pos.xz);
                        float newRadius = radius + sin(t + aRandom * 6.28) * 3.0 * aRandom;
                        pos.x = cos(angle) * newRadius + sin(t * 2.0 + aRandom) * 5.0;
                        pos.z = sin(angle) * newRadius + cos(t * 2.0 + aRandom) * 5.0;
                        pos.y += sin(t * 4.0 + radius * 0.2) * (2.0 + aRandom * 3.0);
                        pos.y *= 1.0 + chaos * 0.3;
                        vAlpha = 0.3 + chaos * 0.7;
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (250.0 / -mv.z) * (0.8 + chaos * 0.4);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor; varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.08, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.6) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core * 0.8), alpha);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            if (particles) particles.material.uniforms.uTime.value = time;
            controls.update();
            composer.render();
        }
    </script>
