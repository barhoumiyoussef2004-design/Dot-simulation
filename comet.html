</head>

    <script type="importmap">
    {"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        let scene, camera, renderer, composer, controls, nucleus, tail, trail, stars, time = 0;
        
        init();
        animate();
        
        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 40);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.5, 0.4);
            bloom.threshold = 0.0;
            composer.addPass(bloom);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            createStars();
            createNucleus();
            createTail();
            createTrail();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createStars() {
            const geometry = new THREE.BufferGeometry();
            const count = 8000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 300;
                positions[i3 + 1] = (Math.random() - 0.5) * 300;
                positions[i3 + 2] = (Math.random() - 0.5) * 300;
                
                const b = 0.4 + Math.random() * 0.6;
                colors[i3] = b; colors[i3 + 1] = b; colors[i3 + 2] = b + Math.random() * 0.2;
                sizes[i] = Math.random() * 0.5 + 0.1;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        pos.x += sin(uTime * 0.3 + aRandom * 10.0) * 2.0;
                        pos.y += cos(uTime * 0.2 + aRandom * 8.0) * 1.5;
                        pos.z += sin(uTime * 0.25 + aRandom * 6.0) * 1.0;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (100.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float a = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(vColor, a * 0.6);
                    }
                `,
                transparent: true,
                depthWrite: false,
                vertexColors: true
            });
            
            stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }
        
        function createNucleus() {
            const geometry = new THREE.BufferGeometry();
            const count = 1000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const r = Math.pow(Math.random(), 3) * 1.5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.cos(phi);
                positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);
                
                const b = 0.7 + Math.random() * 0.3;
                const type = Math.random();
                if (type > 0.7) {
                    colors[i3] = b * 0.9; colors[i3 + 1] = b * 0.85; colors[i3 + 2] = b * 0.8;
                } else if (type > 0.4) {
                    colors[i3] = b * 0.7; colors[i3 + 1] = b * 0.7; colors[i3 + 2] = b * 0.75;
                } else {
                    colors[i3] = b * 0.5; colors[i3 + 1] = b * 0.55; colors[i3 + 2] = b * 0.6;
                }
                
                sizes[i] = Math.random() * 0.5 + 0.2;
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float pulse = sin(uTime * 4.0 + aRandom * 6.28) * 0.1 + 1.0;
                        pos *= pulse;
                        
                        float flicker = sin(uTime * 8.0) * 0.2 + 0.8;
                        vAlpha = flicker;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.12, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.6) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core * 0.7), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            nucleus = new THREE.Points(geometry, material);
            scene.add(nucleus);
        }
        
        function createTail() {
            const geometry = new THREE.BufferGeometry();
            const count = 60000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            const offsets = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                const t = Math.random();
                const spread = t * 40;
                const width = t * 8 * (1 - t * 0.5);
                
                positions[i3] = -spread + (Math.random() - 0.5) * width;
                positions[i3 + 1] = (Math.random() - 0.5) * width * 0.3;
                positions[i3 + 2] = (Math.random() - 0.5) * width * 0.3;
                
                const temp = 1 - t;
                if (temp > 0.8) {
                    colors[i3] = 0.8; colors[i3 + 1] = 0.9; colors[i3 + 2] = 1;
                } else if (temp > 0.5) {
                    colors[i3] = 0.6; colors[i3 + 1] = 0.7; colors[i3 + 2] = 1;
                } else if (temp > 0.2) {
                    colors[i3] = 0.4; colors[i3 + 1] = 0.5; colors[i3 + 2] = 0.8;
                } else {
                    colors[i3] = 0.2; colors[i3 + 1] = 0.3; colors[i3 + 2] = 0.5;
                }
                
                const b = temp * (0.3 + Math.random() * 0.3);
                colors[i3] *= b; colors[i3 + 1] *= b; colors[i3 + 2] *= b;
                
                sizes[i] = (Math.random() * 0.6 + 0.2) * (1 - t * 0.7);
                randoms[i] = Math.random();
                offsets[i] = Math.random() * Math.PI * 2;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            geometry.setAttribute('aOffset', new THREE.BufferAttribute(offsets, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    attribute float aOffset;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying vec3 vColor;
                    varying float vAlpha;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        float wave = sin(uTime * 3.0 + aOffset) * 2.0 * aRandom;
                        float wave2 = cos(uTime * 2.0 + aOffset * 1.5) * 1.5 * aRandom;
                        
                        pos.y += wave;
                        pos.z += wave2;
                        
                        float stream = sin(uTime * 5.0 + pos.x * 0.3) * 0.5;
                        pos.y += stream * aRandom;
                        
                        float fade = 1.0 - (-pos.x) / 40.0;
                        vAlpha = fade * (0.2 + aRandom * 0.5);
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float core = 1.0 - smoothstep(0.0, 0.08, d);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        float alpha = (core + glow * 0.5) * vAlpha;
                        gl_FragColor = vec4(mix(vColor, vec3(1.0), core * 0.4), alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            tail = new THREE.Points(geometry, material);
            scene.add(tail);
        }
        
        function createTrail() {
            const geometry = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const randoms = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                
                const t = i / count;
                const spread = t * 60;
                const width = t * 2;
                
                positions[i3] = -spread + (Math.random() - 0.5) * width;
                positions[i3 + 1] = (Math.random() - 0.5) * width * 0.2;
                positions[i3 + 2] = (Math.random() - 0.5) * width * 0.2;
                
                const b = (1 - t) * 0.3;
                colors[i3] = 0.5 * b; colors[i3 + 1] = 0.6 * b; colors[i3 + 2] = b;
                sizes[i] = (Math.random() * 0.3 + 0.1) * (1 - t * 0.8);
                randoms[i] = Math.random();
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) } },
                vertexShader: `
                    attribute float size;
                    attribute float aRandom;
                    uniform float uTime;
                    uniform float uPixelRatio;
                    varying float vAlpha;
                    
                    void main() {
                        vec3 pos = position;
                        
                        float shimmer = sin(uTime * 4.0 + aRandom * 10.0) * 0.3 + 0.7;
                        float fade = 1.0 - (-pos.x) / 60.0;
                        vAlpha = fade * shimmer * 0.4;
                        
                        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying float vAlpha;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        float glow = 1.0 - smoothstep(0.0, 0.5, d);
                        gl_FragColor = vec4(0.5, 0.6, 1.0, glow * vAlpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });
            
            trail = new THREE.Points(geometry, material);
            scene.add(trail);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            if (stars) stars.material.uniforms.uTime.value = time;
            if (nucleus) nucleus.material.uniforms.uTime.value = time;
            if (tail) tail.material.uniforms.uTime.value = time;
            if (trail) trail.material.uniforms.uTime.value = time;
            
            controls.update();
            composer.render();
        }
    </script>
